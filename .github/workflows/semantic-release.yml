name: Semantic Release

on:
  workflow_call:
    inputs:
      # ── Node.js ────────────────────────────────────────────────────────────
      node-version:
        description: 'Node.js version'
        type: string
        default: '22'
      npm-install-cmd:
        description: 'Install command: "npm ci" (default) or "npm install"'
        type: string
        default: 'npm ci'

      # ── Git identity ────────────────────────────────────────────────────────
      git-author-name:
        description: 'Git commit author name'
        type: string
        required: true
      git-author-email:
        description: 'Git commit author email'
        type: string
        required: true

      # ── Optional: GPG signing ───────────────────────────────────────────────
      gpg-signing:
        description: 'Enable GPG commit signing (requires gpg-private-key secret)'
        type: boolean
        default: false

      # ── Version detection after release ────────────────────────────────────
      version-from:
        description: '"git-tags" (Go/Helm projects) or "package-json" (Node projects)'
        type: string
        default: 'package-json'

      # ── Optional extra tooling (for projects whose release scripts need it) ─
      setup-go:
        description: 'Install Go toolchain (needed if release scripts run go build)'
        type: boolean
        default: false
      go-version-file:
        description: 'go.mod path (used when setup-go: true)'
        type: string
        default: 'go.mod'
      setup-helm:
        description: 'Install Helm (needed if release scripts run helm package/push)'
        type: boolean
        default: false
      helm-version:
        description: 'Helm version to install'
        type: string
        default: '3.17.0'
      install-yq:
        description: 'Install yq mikefarah v4 (needed if release scripts run yq)'
        type: boolean
        default: false
      ghcr-helm-login:
        description: 'Login to GHCR Helm registry (needed if release scripts push Helm charts)'
        type: boolean
        default: false

      # ── Runner ─────────────────────────────────────────────────────────────
      runner:
        description: 'Runner labels JSON array'
        type: string
        default: '["self-hosted", "linux", "ARM64"]'

    secrets:
      github-token:
        required: true
      gpg-private-key:
        required: false
      ghcr-token:
        required: false

    outputs:
      released:
        description: 'true if a new version was released'
        value: ${{ jobs.release.outputs.released }}
      version:
        description: 'Released version without v prefix (e.g. 1.2.3)'
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    runs-on: ${{ fromJson(inputs.runner) }}
    outputs:
      released: ${{ steps.version.outputs.released }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - uses: actions/setup-go@v6
        if: inputs.setup-go
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: false

      - name: Fix Go module cache permissions
        if: inputs.setup-go
        run: chmod -R u+w "$(go env GOMODCACHE)" 2>/dev/null || true

      - uses: azure/setup-helm@v5
        if: inputs.setup-helm
        with:
          version: ${{ inputs.helm-version }}

      - name: Login to GHCR Helm registry
        if: inputs.ghcr-helm-login
        run: echo "${{ secrets.ghcr-token }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Install yq (mikefarah v4)
        if: inputs.install-yq
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_arm64" \
            -o "$HOME/bin/yq"
          chmod +x "$HOME/bin/yq"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Capture version before release
        id: before
        run: |
          if [ "${{ inputs.version-from }}" = "git-tags" ]; then
            echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo 'none')" >> $GITHUB_OUTPUT
          else
            echo "tag=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Import GPG key
        if: inputs.gpg-signing
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.gpg-private-key }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Install dependencies
        run: ${{ inputs.npm-install-cmd }}

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
          GIT_AUTHOR_NAME: ${{ inputs.git-author-name }}
          GIT_AUTHOR_EMAIL: ${{ inputs.git-author-email }}
          GIT_COMMITTER_NAME: ${{ inputs.git-author-name }}
          GIT_COMMITTER_EMAIL: ${{ inputs.git-author-email }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git pull --rebase origin ${{ github.ref_name }}
          npx semantic-release
        timeout-minutes: 10

      - name: Detect released version
        id: version
        run: |
          if [ "${{ inputs.version-from }}" = "git-tags" ]; then
            git fetch --tags --quiet
            BEFORE="${{ steps.before.outputs.tag }}"
            AFTER_FULL=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            AFTER=$(echo "${AFTER_FULL}" | sed 's/^v//')
            if [ -n "${AFTER}" ] && [ "${AFTER_FULL}" != "${BEFORE}" ]; then
              echo "released=true" >> $GITHUB_OUTPUT
              echo "version=${AFTER}" >> $GITHUB_OUTPUT
            else
              echo "released=false" >> $GITHUB_OUTPUT
              echo "version=" >> $GITHUB_OUTPUT
            fi
          else
            VERSION=$(node -p "require('./package.json').version")
            BEFORE="${{ steps.before.outputs.tag }}"
            if [ "$VERSION" != "$BEFORE" ]; then
              echo "released=true" >> $GITHUB_OUTPUT
            else
              echo "released=false" >> $GITHUB_OUTPUT
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi
