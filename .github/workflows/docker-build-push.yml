name: Docker Build & Push

on:
  workflow_call:
    inputs:
      image:
        description: 'Full image name (e.g. ghcr.io/mistwolftech/drift-warden)'
        type: string
        required: true
      version:
        description: 'Version tag to publish (e.g. 1.2.3)'
        type: string
        required: true
      platforms:
        description: 'Target platforms (comma-separated)'
        type: string
        default: 'linux/amd64,linux/arm64'
      dockerfile:
        description: 'Path to Dockerfile'
        type: string
        default: 'Dockerfile'
      context:
        description: 'Build context path'
        type: string
        default: '.'
      build-args:
        description: 'Newline-separated list of build-time variables (KEY=VALUE)'
        type: string
        default: ''
      push-latest:
        description: 'Also push :latest tag'
        type: boolean
        default: true
      cache-from:
        description: 'Cache source (e.g. type=registry,ref=ghcr.io/org/image:buildcache)'
        type: string
        default: ''
      cache-to:
        description: 'Cache destination (e.g. type=registry,ref=ghcr.io/org/image:buildcache,mode=max)'
        type: string
        default: ''
      runner:
        description: 'Runner labels JSON array'
        type: string
        default: '["self-hosted", "linux", "ARM64"]'

    secrets:
      ghcr-token:
        required: true

jobs:
  build-push:
    runs-on: ${{ fromJson(inputs.runner) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ghcr-token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          platforms: ${{ inputs.platforms }}
          build-args: ${{ inputs.build-args }}
          cache-from: ${{ inputs.cache-from }}
          cache-to: ${{ inputs.cache-to }}
          tags: |
            ${{ inputs.image }}:${{ inputs.version }}
            ${{ inputs.push-latest && format('{0}:latest', inputs.image) || '' }}
